version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: pgvector-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: lap006
      POSTGRES_DB: airnir
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - postgres

  # ── Full-stack profile (docker compose --profile full up -d) ───────
  # Requires: SQL Server running on host, OPENAI_API_KEY env var set.

  arnir-admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: arnir-admin
    profiles: ["full"]
    ports:
      - "5001:5001"
    environment:
      - ConnectionStrings__DefaultConnection=Server=host.docker.internal;Database=ArNir;Trusted_Connection=False;User Id=sa;Password=YOUR_SQL_PASSWORD;MultipleActiveResultSets=true;TrustServerCertificate=True;
      - ConnectionStrings__Postgres=Host=postgres;Database=airnir;Username=postgres;Password=lap006
      - OpenAI__ApiKey=${OPENAI_API_KEY:-sk-placeholder}
    depends_on:
      postgres:
        condition: service_healthy

  arnir-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: arnir-api
    profiles: ["full", "demos"]
    ports:
      - "5000:5000"
    environment:
      - ConnectionStrings__SqlServer=Server=host.docker.internal;Database=AirNir_SQL;Trusted_Connection=False;User Id=sa;Password=YOUR_SQL_PASSWORD;MultipleActiveResultSets=true;TrustServerCertificate=True;
      - ConnectionStrings__Postgres=Host=postgres;Database=airnir;Username=postgres;Password=lap006
      - OpenAI__ApiKey=${OPENAI_API_KEY:-sk-placeholder}
    depends_on:
      postgres:
        condition: service_healthy

  # ── Demo Frontends (docker compose --profile demos up -d) ────────

  healthcare-demo:
    build:
      context: .
      dockerfile: frontend/healthcare-demo/Dockerfile
    container_name: arnir-healthcare
    profiles: ["demos"]
    ports:
      - "3001:80"
    environment:
      - API_BASE_URL=http://localhost:5000/api
    depends_on:
      - arnir-api
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ecommerce-demo:
    build:
      context: .
      dockerfile: frontend/ecommerce-demo/Dockerfile
    container_name: arnir-ecommerce
    profiles: ["demos"]
    ports:
      - "3002:80"
    environment:
      - API_BASE_URL=http://localhost:5000/api
    depends_on:
      - arnir-api
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  finance-demo:
    build:
      context: .
      dockerfile: frontend/finance-demo/Dockerfile
    container_name: arnir-finance
    profiles: ["demos"]
    ports:
      - "3003:80"
    environment:
      - API_BASE_URL=http://localhost:5000/api
    depends_on:
      - arnir-api
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
